        { q: "ଗୋଆକୁ ପୁର୍ତ୍ତୁଗାଲ ଶାସନରୁ ମୁକ୍ତ କରିବା ପାଇଁ ଭାରତୀୟ ସେନା ଦ୍ୱାରା କେଉଁ ଅପରେସନ୍ ଚଲାଯାଇଥିଲା?", a: "ଅପରେସନ୍ ପୋଲୋ", b: "ଅପରେସନ୍ ବିଜୟ", c: "ଅପରେସନ୍ ମେଘଦୂତ", d: "ଅପରେସନ୍ ଗଙ୍ଗା", correct: "b", note: "<strong>Related Note:</strong> ୧୯୬୧ ମସିହାରେ ଭାରତୀୟ ସେନା 'Operation Vijay' ମାଧ୍ୟମରେ ଗୋଆକୁ ୪୫୦ ବର୍ଷର ପୁର୍ତ୍ତୁଗୀଜ୍ ଶାସନରୁ ମୁକ୍ତ କରିଥିଲା। ପ୍ରତିବର୍ଷ ୧୯ ଡିସେମ୍ବରକୁ ଗୋଆ ମୁକ୍ତି ଦିବସ (Goa Liberation Day) ପାଳନ କରାଯାଏ।" },
        { q: "ଏସୀୟ ଅଣ୍ଡର-୨୦ ଆଥଲେଟିକ୍ସ ଚାମ୍ପିଅନସିପ୍ ୨୦୨୬ ରେ କେଉଁ ଭାରତୀୟ ମହିଳา ହାଇ ଜମ୍ପର ୧.୯୩ ମିଟର ଜମ୍ପ୍ କରି ସିନିୟର ନ୍ୟାସନାଲ୍ ରେକର୍ଡ କରିଛନ୍ତି?", a: "ପୂଜา ସିଂ", b: "ତେଜସ୍ୱୀନ ଶଙ୍କର", c: "ପୂଜา ପ୍ରଧାନ", d: "ହରଭଜନ ସିଂ", correct: "a", note: "<strong>Related Note:</strong> ପୂଜା ସିଂ ହରିୟାଣାର ବାସିନ୍ଦା। ସେ ମାତ୍ର ୧୭ ବର୍ଷ ବୟସରେ ଏହି ରେକର୍ଡ କରି ଅଲିମ୍ପିକ୍ସ ଯୋଗ୍ୟତା ପାଇଁ ନିଜର ଦାବି ମଜବୁତ କରିଛନ୍ତି।" },
        { q: "ଭାରତର ପ୍ରଥମ ପାଣିପାଗ ସୂଚନା ସିଷ୍ଟମ୍ 'ସ୍କାଇ କାଷ୍ଟ' (Sky Cast System) କେଉଁଠାରେ ଲଞ୍ଚ କରାଯାଇଛି?", a: "ଜେବର ବିମାନବନ୍ଦର", b: "ଇନ୍ଦିରା ଗାନ୍ଧୀ ଆନ୍ତର୍ଜାତୀୟ ବିମାନବନ୍ଦର", c: "ବିଜୁ ପଟ୍ଟନାୟକ ବିମାନବନ୍ଦର", d: "କେମ୍ପେଗୌଡା ବିମାନବନ୍ଦର", correct: "b", note: "<strong>Related Note:</strong> ଏହି ସିଷ୍ଟମ୍ ବିମାନବନ୍ଦରରେ ଖରାପ ପାଣିପାଗ ଏବଂ ବିଜୁଳି ମାରିବାର ତଥ୍ୟ ବହୁ ପୂର୍ବରୁ ସଠିକ୍ ଭାବେ ପ୍ରଦାନ କରିବ, ଯାହାଫଳରେ ବିମାନ ଯାତ୍ରା ଅଧିକ ସୁରକ୍ଷିତ ହେବ।" },
        { q: "ଚତୁର୍ଥ ଲ୍ୟାଭେଣ୍ଡର ଫେଷ୍ଟିଭାଲ୍ ୨୦୨୬ (Lavender Festival) ଜମ୍ମୁ-କାଶ୍ମୀରର କେଉଁ ସ୍ଥାନରେ ଆୟୋଜିତ ହେବ?", a: "ଶ୍ରୀନଗର", b: "ଭଦ୍ରବାହ", c: "ଜମ୍ମୁ", d: "ଗୁଲମାର୍ଗ", correct: "b", note: "<strong>Related Note:</strong> ଜମ୍ମୁ-କାଶ୍ମୀରର ଭଦ୍ରବାହ (Bhaderwah) କୁ 'Lavender Capital of India' କୁହାଯାଏ। ଭାରତରେ 'ନୀଳ ବିପ୍ଳବ' ବା 'Purple Revolution' ଏହି ଲ୍ୟାଭେଣ୍ଡର ଫୁଲ ଚାଷ ସହ ଜଡ଼ିତ।" },
        { q: "[Question of the Day]: ଭାରତର କେଉଁ ବୈଜ୍ଞାନିକଙ୍କୁ 'Missile Man of India' କୁହାଯାଏ?", a: "ଡ. ସତୀଶ ରେଡ୍ଡୀ", b: "ଡ. ଏ.ପି.ଜେ. ଅବଦୁଲ କଲାମ", c: "ସି.ଭି. ରମଣ", d: "ହୋମି ଜାହାଙ୍ଗୀର ଭାଭା", correct: "b", note: "<strong>Related Note:</strong> ଡ. ଏ.ପି.ଜେ. ଅବଦୁଲ କଲାମ ଭାରତର ୧୧ତମ ରାଷ୍ଟ୍ରପତି ଥିଲେ। ଭାରତର ମିସାଇଲ୍ ପ୍ରୋଗ୍ରାମ (ଯେପରିକି ଅଗ୍ନି ଏବଂ ପୃଥ୍ୱୀ ମିସାଇଲ୍) ବିକାଶରେ ତାଙ୍କର ସବୁଠାରୁ ବଡ଼ ଅବଦାନ ଥିଲା।" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const quizBody = document.getElementById('quiz-body');
    const nextBtn = document.getElementById('next-btn');
    const qNumDisplay = document.getElementById('question-number');
    const navSection = document.getElementById('nav-section');
    const scoreCard = document.getElementById('score-card');
    const badgeDisplay = document.getElementById('performance-badge');

    function loadQuiz() {
        quizData.forEach((data, index) => {
            const qBox = document.createElement('div');
            qBox.classList.add('question-box');
            if(index === 0) qBox.classList.add('active');
            qBox.id = `q-${index}`;

            qBox.innerHTML = `
                <div class="question-text">${index + 1}. ${data.q}</div>
                <div class="options-container">
                    <button class="option-btn" onclick="checkAnswer(this, ${index}, 'a')">A) ${data.a}</button>
                    <button class="option-btn" onclick="checkAnswer(this, ${index}, 'b')">B) ${data.b}</button>
                    <button class="option-btn" onclick="checkAnswer(this, ${index}, 'c')">C) ${data.c}</button>
                    <button class="option-btn" onclick="checkAnswer(this, ${index}, 'd')">D) ${data.d}</button>
                </div>
                <div class="note-box" id="note-${index}">${data.note}</div>
            `;
            quizBody.appendChild(qBox);
        });
    }

    function checkAnswer(selectedBtn, qIndex, selectedOption) {
        const currentQuestion = quizData[qIndex];
        const correctOption = currentQuestion.correct;
        const qBox = document.getElementById(`q-${qIndex}`);
        const buttons = qBox.querySelectorAll('.option-btn');
        const noteBox = document.getElementById(`note-${qIndex}`);

        // Disable all options
        buttons.forEach(btn => btn.disabled = true);

        // Highlight correct/wrong answer
        if (selectedOption === correctOption) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            buttons.forEach(btn => {
                if(btn.getAttribute('onclick').includes(`'${correctOption}'`)) {
                    btn.classList.add('correct');
                }
            });
        }

        // Show the related note smoothly
        noteBox.style.display = 'block';

        nextBtn.disabled = false;
        if(currentQuestionIndex === quizData.length - 1) {
            nextBtn.innerText = "ଫଳାଫଳ ଦେଖନ୍ତୁ";
        }
    }

    function nextQuestion() {
        const currentQBox = document.getElementById(`q-${currentQuestionIndex}`);
        currentQBox.classList.remove('active');

        currentQuestionIndex++;

        if (currentQuestionIndex < quizData.length) {
            const nextQBox = document.getElementById(`q-${currentQuestionIndex}`);
            nextQBox.classList.add('active');
            
            qNumDisplay.innerText = `ପ୍ରଶ୍ନ ${currentQuestionIndex + 1} / ${quizData.length}`;
            nextBtn.disabled = true;
        } else {
            quizBody.style.display = 'none';
            navSection.style.display = 'none';
            scoreCard.style.display = 'block';
            document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
            
            if(score >= 11) {
                badgeDisplay.innerHTML = "🏆 Excellent Performance!<br>ଆପଣ ଭିଡିଓଟିକୁ ବହୁତ ଭଲ ଭାବେ ବୁଝିଛନ୍ତି ଏବଂ ଆପଣଙ୍କ ପ୍ରସ୍ତୁତି ଉଚ୍ଚକୋଟୀର ଅଟେ।";
                badgeDisplay.style.color = "#4cd137";
            } else if(score >= 7) {
                badgeDisplay.innerHTML = "✨ Very Good!<br>ଆପଣଙ୍କ ସ୍କୋର ଭଲ ଅଛି, ଆଉ ଟିକେ ଚେଷ୍տା କଲେ ସବୁ ପ୍ରଶ୍ନ ଠିକ୍ ହୋଇପାରିବ।";
                badgeDisplay.style.color = "#00a8ff";
            } else {
                badgeDisplay.innerHTML = "📚 Keep Learning!<br>ଭିଡିଓର ତଥ୍ୟଗୁଡ଼ିକୁ ଆଉ ଥରେ ପଢ଼ନ୍ତୁ ଏବଂ ପ୍ରଶ୍ନର ନୋଟ୍ ଗୁଡ଼ିକୁ ମନେ ରଖନ୍ତୁ।";
                badgeDisplay.style.color = "#e84118";
            }
        }
    }

    loadQuiz();
</script>
