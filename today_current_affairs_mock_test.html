<!DOCTYPE html>
<html lang="hi">
<head>
    <script data-cfasync='false' src='//wwr.giriudog.com/?tag=9025f181'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Excellent Coaching - Weekly Mock Test</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --accent: #e67e22; --success: #27ae60; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid var(--secondary); margin-bottom: 30px; padding-bottom: 20px; }
        .coaching-name { color: var(--accent); font-size: 2.5em; font-weight: bold; margin: 0; text-transform: uppercase; }
        .test-info { font-size: 1.2em; color: var(--primary); margin-top: 10px; font-weight: 600; }
        .q-card { margin-bottom: 25px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fff; transition: 0.3s; }
        .q-card:hover { border-color: var(--secondary); box-shadow: 0 5px 15px rgba(52,152,219,0.1); }
        .q-text { font-size: 1.1em; font-weight: bold; margin-bottom: 15px; display: block; }
        .options { list-style: none; padding: 0; }
        .options li { margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; }
        input[type="radio"] { margin-right: 12px; cursor: pointer; width: 18px; height: 18px; }
        .submit-area { position: sticky; bottom: 20px; background: white; padding: 20px; border-top: 2px solid #eee; text-align: center; }
        .btn { padding: 15px 40px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.3em; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #219150; transform: translateY(-2px); }
        #result { display: none; margin-top: 20px; padding: 20px; border-radius: 10px; text-align: center; font-size: 1.5em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="coaching-name">RK Excellent Coaching</div>
        <div class="test-info">Weekly Current Affairs: 4 - 10 May 2026</div>
        <p>Bargarh, Odisha | Mathematics & GS Special</p>
    </div>

    <form id="quizForm">
        <div id="questions-container"></div>
        
        <div class="submit-area">
            <button type="button" class="btn" onclick="checkQuiz()">Submit Test & See Score</button>
            <div id="result"></div>
        </div>
    </form>
</div>

<script>
    const quizData = [
        { q: "World Press Freedom Index 2026 mein Bharat ki rank kya hai?", a: "157", o: ["151", "157", "161", "142"] },
        { q: "Bharat ka pehla 'Paperless Judiciary' rajya kaun bana?", a: "Sikkim", o: ["Kerala", "Sikkim", "Odisha", "Goa"] },
        { q: "Supreme Court mein judges ki sankhya badhakar kitni karne ki manzoori mili?", a: "38", o: ["34", "38", "40", "36"] },
        { q: "World Migration Report 2026 ke anusar sabse bada Remittance praptkarta?", a: "India", o: ["China", "Mexico", "India", "USA"] },
        { q: "SIMBEX-II 2026 abhyas किन deshon ke beech hua?", a: "India-Cambodia", o: ["India-Singapore", "India-Cambodia", "India-Thailand", "India-Vietnam"] },
        { q: "TVK party ne Tamil Nadu mein kitni सीटें jeeti?", a: "108", o: ["59", "108", "118", "47"] },
        { q: "Prasar Bharati ke naye adhyaksh kaun bane?", a: "Prasoon Joshi", o: ["Navneet Sehgal", "Prasoon Joshi", "Amitabh Kant", "S. Somanath"] },
        { q: "Bharat ki pehli Space Tech Unicorn kaun si hai?", a: "Skyroot Aerospace", o: ["AgniKul", "Skyroot Aerospace", "Pixxel", "Bellatrix"] },
        { q: "Bharat ka pehla 'Pearl Farming Cluster' kahan hai?", a: "Hazaribagh", o: ["Bargarh", "Hazaribagh", "Surat", "Patna"] },
        { q: "Mission for Cotton Productivity ke liye kitna budget allot hua?", a: "₹5659 Crore", o: ["₹4500 Crore", "₹5659 Crore", "₹6000 Crore", "₹3500 Crore"] },
        { q: "UNESCO World Press Freedom Prize 2026 kise mila?", a: "Sudanese Journalists", o: ["Indian Journalists", "Sudanese Journalists", "New York Times", "BBC"] },
        { q: "World Red Cross Day kab manaya jata hai?", a: "8 May", o: ["1 May", "8 May", "5 May", "10 May"] },
        { q: "INS Mahendragiri kis project ke tehat bana?", a: "Project 17A", o: ["Project 75", "Project 15B", "Project 17A", "Project 21"] },
        { q: "World Athletics Day 2026 kab manaya gaya?", a: "7 May", o: ["5 May", "7 May", "8 May", "10 May"] },
        { q: "Great Nicobar Project kis Strait ke paas hai?", a: "Malacca Strait", o: ["Palk Strait", "Malacca Strait", "Bering Strait", "Gibraltar"] },
        { q: "WHO ke anusar 2024 mein Hepatitis se kitni mautein hui?", a: "1.3 Million", o: ["1.0 M", "1.3 M", "2.0 M", "0.5 M"] },
        { q: "RBI ke naye Deputy Governor kaun bane?", a: "Rohit Jain", o: ["Shaktikanta Das", "Rohit Jain", "T. Rabi Sankar", "Urjit Patel"] },
        { q: "ADB ne digital connectivity ke liye kitna nivesh ghoshit kiya?", a: "70 Billion", o: ["50 Billion", "70 Billion", "100 Billion", "25 Billion"] },
        { q: "Thalapathy Vijay ki party TVK ka poora naam kya hai?", a: "Tamilaga Vettri Kazhagam", o: ["Tamil Victory Party", "Tamilaga Vettri Kazhagam", "Vijay People Party", "DMK Plus"] },
        { q: "Portable MRI machine pehli baar kahan install hui?", a: "AIIMS Delhi", o: ["AIIMS Bhubaneswar", "AIIMS Delhi", "Apollo", "Fortis"] },
        { q: "International Big Cat Alliance ka headquarter kahan hai?", a: "New Delhi", o: ["Mysore", "New Delhi", "Dehradun", "Nagpur"] },
        { q: "Sabse zyada Cyber Crime kis shehar mein darj hue?", a: "Bengaluru", o: ["Mumbai", "Hyderabad", "Bengaluru", "Delhi"] },
        { q: "World Migration Report 2026 kaun jari karta hai?", a: "IOM", o: ["WHO", "IOM", "World Bank", "UN"] },
        { q: "Smart Island Monitoring System kahan launch hua?", a: "Galapagos Islands", o: ["Andaman", "Galapagos Islands", "Maldives", "Lakshadweep"] },
        { q: "World Press Freedom Index mein Top par kaun sa desh hai?", a: "Norway", o: ["India", "USA", "Norway", "China"] }
    ];

    const container = document.getElementById('questions-container');
    quizData.forEach((data, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <span class="q-text">${index + 1}. ${data.q}</span>
            <ul class="options">
                ${data.o.map(opt => `<li><input type="radio" name="q${index}" value="${opt}"> ${opt}</li>`).join('')}
            </ul>
        `;
        container.appendChild(div);
    });

    function checkQuiz() {
        let score = 0;
        quizData.forEach((data, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && selected.value === data.a) score++;
        });
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `RK Excellent Coaching Result: <br> Your Score: ${score} / 25`;
        resultDiv.style.color = score > 15 ? 'green' : 'red';
    }
</script>

</body>
</html>
